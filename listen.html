<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>listen — dynammike</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      background:
        radial-gradient(
          ellipse at center,
          rgba(255,255,255,0.72) 0%,
          rgba(255,255,255,0.32) 22%,
          rgba(245,245,241,0.0) 58%
        ),
        #f5f5f1;
      font-family:Arial, Helvetica, sans-serif;
      color:#111;
      min-height:100vh;
      position:relative;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
      opacity:0.045;
      pointer-events:none;
    }

    .wrap{
      position:relative;
      z-index:1;
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:60px 24px 80px;
    }

    .top{
      text-align:center;
      margin-bottom:60px;
      opacity:0;
      animation:fadeUp 1.8s ease forwards;
    }

    .top a{
      text-decoration:none;
      color:#111;
      opacity:0.72;
      letter-spacing:0.28em;
      text-transform:lowercase;
      font-size:11px;
    }

    .top a:hover{
      opacity:0.35;
    }

    h1{
      margin:0 0 18px 0;
      font-size:12px;
      font-weight:normal;
      letter-spacing:0.35em;
      text-transform:lowercase;
      color:#6f6f69;
      text-align:center;
    }

    .line{
      width:170px;
      max-width:60%;
      height:1px;
      background:rgba(0,0,0,0.18);
      margin:0 auto 42px;
    }

    .intro{
      text-align:center;
      color:#5f5f59;
      font-size:14px;
      line-height:1.9;
      max-width:560px;
      margin:0 auto 44px;
      opacity:0;
      animation:fadeUp 2.2s ease forwards;
    }

    .player-wrap{
      max-width:760px;
      margin:0 auto;
      opacity:0;
      animation:fadeUp 2.6s ease forwards;
    }

    .player-box{
      background:rgba(255,255,255,0.35);
      border:1px solid rgba(0,0,0,0.05);
      padding:18px;
    }

    iframe{
      width:100%;
      height:120px;
      border:0;
      display:block;
    }

    .mixcloud-link{
      text-align:center;
      margin-top:26px;
      opacity:0;
      animation:fadeUp 3s ease forwards;
    }

    .mixcloud-link a{
      text-decoration:none;
      color:#222;
      font-size:11px;
      letter-spacing:0.25em;
      text-transform:lowercase;
      opacity:0.72;
    }

    .mixcloud-link a:hover{
      opacity:0.35;
    }

    @keyframes fadeUp{
      0%{
        opacity:0;
        transform:translateY(12px);
      }
      100%{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width:700px){
      .wrap{
        padding:42px 18px 60px;
      }

      .intro{
        font-size:13px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <a href="index.html">back</a>
    </div>

    <h1>listen</h1>
    <div class="line"></div>

    <div class="intro">
      a showcase set<br>
      more on mixcloud
    </div>

    <div class="player-wrap">
      <div class="player-box">
        <iframe
          src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&mini=1&feed=%2Fdynammike%2F"
          allow="autoplay"
          loading="lazy">
        </iframe>
      </div>
    </div>

    <div class="mixcloud-link">
      <a href="https://www.mixcloud.com/dynammike/" target="_blank">open mixcloud</a>
    </div>
  </div>
</body>
</html>
