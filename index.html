<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dynammike</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
min-height:100%;
}

body{
background:#f7f7f4;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:#111;
position:relative;
overflow:hidden;
}

/* Filmgrain */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.06;
pointer-events:none;
}

/* Wrapper */

.wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
position:relative;
}

/* LOGO CONTAINER */

.logo-box{
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

/* Ground Shadow */

.logo-box::after{
content:"";
position:absolute;
bottom:-40px;
width:60%;
height:40px;
background:radial-gradient(
ellipse at center,
rgba(0,0,0,0.45) 0%,
rgba(0,0,0,0.25) 40%,
rgba(0,0,0,0.05) 70%,
rgba(0,0,0,0) 100%
);
filter:blur(14px);
z-index:0;
}

/* LOGO */

.logo{

width:min(1000px,80vw);
height:auto;
z-index:1;

opacity:0;

animation:
logoFade 3s cubic-bezier(.22,.61,.36,1) forwards,
logoBreath 12s ease-in-out infinite;

/* MUCH STRONGER SHADOW */

filter:

grayscale(1)
brightness(1.05)
contrast(1.2)

/* main depth */

drop-shadow(0 60px 120px rgba(0,0,0,0.55))
drop-shadow(0 30px 60px rgba(0,0,0,0.45))
drop-shadow(0 12px 24px rgba(0,0,0,0.35))

/* emboss edge */

drop-shadow(6px 6px 20px rgba(0,0,0,0.35))

/* highlight */

drop-shadow(-3px -3px 6px rgba(255,255,255,0.95));

}

/* Fade Animation */

@keyframes logoFade{

0%{
opacity:0;
transform:scale(0.85);
filter:blur(14px);
}

60%{
opacity:0.8;
transform:scale(1.05);
filter:blur(1px);
}

100%{
opacity:0.96;
transform:scale(1);
filter:blur(0);
}

}

/* Breathing */

@keyframes logoBreath{

0%{
transform:scale(1);
}

50%{
transform:scale(1.02);
}

100%{
transform:scale(1);
}

}

/* MENU */

.menu{
margin-top:40px;
font-size:12px;
letter-spacing:0.35em;
text-transform:lowercase;
text-align:center;
}

.menu a{
text-decoration:none;
color:#111;
margin:0 18px;
opacity:0.75;
transition:opacity 0.25s ease;
}

.menu a:hover{
opacity:0.35;
}

/* Subtitle */

.subtle{
margin-top:20px;
font-size:10px;
letter-spacing:0.28em;
opacity:0.35;
text-transform:lowercase;
}

/* Mobile */

@media (max-width:700px){

.logo{
width:90vw;
}

.menu{
letter-spacing:0.22em;
}

.menu a{
margin:0 10px;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="logo-box">
<img src="log_web.png" alt="dynammike" class="logo">
</div>

<nav class="menu">
<a href="listen.html">listen</a>
<a href="occasions.html">occasions</a>
<a href="contact.html">contact</a>
</nav>

<div class="subtle">
music for certain occasions
</div>

</div>

</body>

</html>
