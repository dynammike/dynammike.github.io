<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dynammike</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      background:#f5f5f1;
      font-family:Arial, Helvetica, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      color:#111;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
      opacity:0.045;
      pointer-events:none;
    }

    .wrap{
      width:100%;
      padding:40px 20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
      z-index:1;
    }

    /* LOGO STACK */

    .logo-scene{
      position:relative;
      width:min(1000px, 82vw);
      animation:
        logoFade 3.2s cubic-bezier(.22,.61,.36,1) forwards,
        logoBreath 11s ease-in-out infinite;
      opacity:0;
    }

    .logo-layer{
      display:block;
      width:100%;
      height:auto;
      position:absolute;
      top:0;
      left:0;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    /* helle obere linke Kante */
    .logo-highlight{
      transform:translate(-3px,-3px);
      opacity:0.95;
      filter:
        grayscale(1)
        brightness(1.35)
        contrast(1.1)
        blur(1.2px);
      mix-blend-mode:screen;
    }

    /* dunkle Kontur direkt an der Schrift */
    .logo-edge-shadow{
      transform:translate(3px,3px);
      opacity:0.34;
      filter:
        brightness(0)
        saturate(0)
        blur(0.18px);
      mix-blend-mode:multiply;
    }

    /* tieferer Schatten für mehr Prägung */
    .logo-deep-shadow{
transform:translate(12px,12px);
opacity:0.40;
filter:
brightness(0)
saturate(0)
blur(18px);
mix-blend-mode:multiply;
}

    /* Original */
    .logo-main{
      position:relative;
      display:block;
      width:100%;
      height:auto;
      opacity:0.98;
      filter:
        grayscale(1)
        brightness(0.98)
        contrast(1.28);
    }

    /* MENU */

    .menu{
      margin-top:42px;
      text-align:center;
      font-size:12px;
      letter-spacing:0.35em;
      text-transform:lowercase;
    }

    .menu a{
      text-decoration:none;
      color:#111;
      margin:0 18px;
      opacity:0.72;
      transition:opacity 0.25s ease;
    }

    .menu a:hover{
      opacity:0.32;
    }

.subtle{
  margin-top:36px;
  font-size:10px;
  letter-spacing:0.28em;
  text-transform:lowercase;
  text-align:center;
  position:relative;
  display:inline-block;
  padding-bottom:14px;
  color:#6e6e68;
}

/* Linie */

.subtle::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:1px;

  background:rgba(0,0,0,0.18);
}

    @keyframes logoFade{
      0%{
        opacity:0;
        transform:scale(0.88);
        filter:blur(10px);
      }
      60%{
        opacity:0.78;
        transform:scale(1.03);
        filter:blur(1px);
      }
      100%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
      }
    }

    @keyframes logoBreath{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.015);
      }
      100%{
        transform:scale(1);
      }
    }

    @media (max-width:700px){
      .logo-scene{
        width:92vw;
      }

      .menu{
        font-size:11px;
        letter-spacing:0.22em;
      }

      .menu a{
        margin:0 10px;
      }

      .subtle{
        font-size:9px;
        letter-spacing:0.18em;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="logo-scene">
      <img src="logo_web.png" alt="" class="logo-layer logo-deep-shadow" aria-hidden="true">
      <img src="logo_web.png" alt="" class="logo-layer logo-edge-shadow" aria-hidden="true">
      <img src="logo_web.png" alt="" class="logo-layer logo-highlight" aria-hidden="true">
      <img src="logo_web.png" alt="Dynammike" class="logo-main">
    </div>

<div class="subtle">music for certain occasions</div>

<nav class="menu">
  <a href="listen.html">listen</a>
  <a href="occasions.html">occasions</a>
  <a href="contact.html">contact</a>
</nav>

</body>
</html>
