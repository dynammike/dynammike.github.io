<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dynammike</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      background: #f5f5f3;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: min(1000px, 82vw);
      height: auto;
      display: block;
      opacity: 0.92;

      filter:
        grayscale(1)
        brightness(1.18)
        contrast(0.88)
        drop-shadow(0 18px 30px rgba(0, 0, 0, 0.10))
        drop-shadow(0 4px 10px rgba(0, 0, 0, 0.05))
        drop-shadow(-2px -2px 4px rgba(255, 255, 255, 0.95));
    }

    .menu {
      margin-top: 34px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: lowercase;
    }

    .menu a {
      color: #111;
      text-decoration: none;
      margin: 0 16px;
      opacity: 0.8;
      transition: opacity 0.25s ease;
    }

    .menu a:hover {
      opacity: 0.35;
    }

    .subtle {
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: lowercase;
      opacity: 0.35;
      text-align: center;
    }

    @media (max-width: 700px) {
      .logo {
        width: 90vw;
      }

      .menu {
        margin-top: 24px;
        font-size: 11px;
        letter-spacing: 0.22em;
      }

      .menu a {
        margin: 0 10px;
      }

      .subtle {
        font-size: 9px;
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <img src="logo_web.png" alt="dynammike" class="logo">

    <nav class="menu">
      <a href="listen.html">listen</a>
      <a href="occasions.html">occasions</a>
      <a href="contact.html">contact</a>
    </nav>

    <div class="subtle">music for certain occasions</div>
  </div>

</body>
</html>
