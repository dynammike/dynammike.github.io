<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dynammike</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
min-height:100%;
}

/* BACKGROUND */

body{

background:#f6f6f3;

font-family:Arial, Helvetica, sans-serif;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;
color:#111;

position:relative;
overflow:hidden;

}

/* FILM GRAIN */

body::before{

content:"";

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("https://grainy-gradients.vercel.app/noise.svg");

opacity:0.06;

pointer-events:none;

}

/* WRAPPER */

.wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
position:relative;
}

/* LOGO */

.logo{

width:min(1000px,80vw);
height:auto;

opacity:0;

animation:
logoFade 3s cubic-bezier(.22,.61,.36,1) forwards,
logoBreath 12s ease-in-out infinite;

/* stronger emboss + shadow */

filter:

grayscale(1)
brightness(1.05)
contrast(1.12)

/* main shadow */

drop-shadow(0 30px 60px rgba(0,0,0,0.28))
drop-shadow(0 12px 24px rgba(0,0,0,0.20))

/* emboss highlight */

drop-shadow(-2px -2px 4px rgba(255,255,255,0.95))
drop-shadow(4px 4px 12px rgba(0,0,0,0.18));

}

/* FADE IN */

@keyframes logoFade{

0%{
opacity:0;
transform:scale(0.88);
filter:blur(10px);
}

60%{
opacity:0.75;
transform:scale(1.04);
filter:blur(1px);
}

100%{
opacity:0.95;
transform:scale(1);
filter:blur(0);
}

}

/* BREATHING */

@keyframes logoBreath{

0%{
transform:scale(1);
}

50%{
transform:scale(1.018);
}

100%{
transform:scale(1);
}

}

/* MENU */

.menu{

margin-top:36px;

font-size:12px;
letter-spacing:0.35em;
text-transform:lowercase;
text-align:center;

}

.menu a{

text-decoration:none;
color:#111;

margin:0 18px;

opacity:0.75;

transition:opacity 0.25s ease;

}

.menu a:hover{
opacity:0.35;
}

/* SUBTITLE */

.subtle{

margin-top:20px;

font-size:10px;
letter-spacing:0.28em;

opacity:0.35;

text-transform:lowercase;

}

/* MOBILE */

@media (max-width:700px){

.logo{
width:90vw;
}

.menu{
letter-spacing:0.22em;
}

.menu a{
margin:0 10px;
}

}

</style>

</head>

<body>

<div class="wrap">

<img src="dynammike_logo.png" alt="Dynammike" class="logo">

<nav class="menu">
<a href="listen.html">listen</a>
<a href="occasions.html">occasions</a>
<a href="contact.html">contact</a>
</nav>

<div class="subtle">
music for certain occasions
</div>

</div>

</body>

</html>
