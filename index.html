<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dynammike</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
min-height:100%;
}

body{
background:#f7f7f4;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:#111;
position:relative;
overflow:hidden;
}

/* subtle grain */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.05;
pointer-events:none;
}

.wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
}

/* LOGO */

.logo{

width:min(1000px,80vw);
height:auto;

opacity:0;

animation:
logoFade 3s cubic-bezier(.22,.61,.36,1) forwards,
logoBreath 12s ease-in-out infinite;

/* EMBOSS EFFECT */

filter:
grayscale(1)
brightness(0.96)
contrast(1.35)

drop-shadow(-1px -1px 0 rgba(255,255,255,1))
drop-shadow(-2px -2px 0 rgba(255,255,255,0.9))
drop-shadow(-3px -3px 2px rgba(255,255,255,0.7))

drop-shadow(1px 1px 0 rgba(0,0,0,0.45))
drop-shadow(2px 2px 0 rgba(0,0,0,0.40))
drop-shadow(3px 3px 2px rgba(0,0,0,0.35))
drop-shadow(4px 4px 4px rgba(0,0,0,0.30))

drop-shadow(6px 6px 8px rgba(0,0,0,0.25));
}

/* Fade */

@keyframes logoFade{

0%{
opacity:0;
transform:scale(0.85);
filter:blur(14px);
}

60%{
opacity:0.8;
transform:scale(1.05);
filter:blur(1px);
}

100%{
opacity:0.97;
transform:scale(1);
filter:blur(0);
}

}

/* breathing */

@keyframes logoBreath{

0%{
transform:scale(1);
}

50%{
transform:scale(1.02);
}

100%{
transform:scale(1);
}

}

/* MENU */

.menu{
margin-top:40px;
font-size:12px;
letter-spacing:0.35em;
text-transform:lowercase;
text-align:center;
}

.menu a{
text-decoration:none;
color:#111;
margin:0 18px;
opacity:0.75;
transition:opacity 0.25s ease;
}

.menu a:hover{
opacity:0.35;
}

/* tagline */

.subtle{
margin-top:20px;
font-size:10px;
letter-spacing:0.28em;
opacity:0.35;
text-transform:lowercase;
}

/* mobile */

@media (max-width:700px){

.logo{
width:90vw;
}

.menu{
letter-spacing:0.22em;
}

.menu a{
margin:0 10px;
}

}

</style>

</head>

<body>

<div class="wrap">

<img src="logo_web.png" alt="Dynammike" class="logo">

<nav class="menu">
<a href="listen.html">listen</a>
<a href="occasions.html">occasions</a>
<a href="contact.html">contact</a>
</nav>

<div class="subtle">
music for certain occasions
</div>

</div>

</body>

</html>
